<div class="page">

  <div class="container_boven">
    <img id="randomImage" class="afb1" alt="Random afbeelding">

 <span id="changeImageText"> > next > </span>
  </div>


<script>
  const images = [
    "images/afb4.jpg",
    "images/afb8.jpg",
    "images/afb22.jpg",
    "images/afb23.jpeg",
    "images/afb24.jpeg",
    "images/afb2.jpg",
    "images/afb5.jpg",
    "images/kim1.jpg",
    "images/kim2.jpg",
    "images/krant1.jpeg",
    "images/krant2.jpeg",
    "images/afb3.jpg",
    "images/afb6.jpg",
    "images/afb7.jpg",
    "images/afb11.jpg"
  ];

  const img = document.getElementById("randomImage");
  const text = document.getElementById("changeImageText");

  let currentIndex = 0;

  // start direct met eerste image
  img.src = images[currentIndex];

  function showNextImage() {
    currentIndex++;

    if (currentIndex >= images.length) {
      currentIndex = 0;
    }

    img.src = images[currentIndex];
  }

  // Mobiel: knop
  if (text) {
    text.addEventListener("click", showNextImage);
  }
</script>
